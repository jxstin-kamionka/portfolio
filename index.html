<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Justin Kamionka - Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />

    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <clipPath id="heroCurve" clipPathUnits="objectBoundingBox">
          <path d="M 0.46 1 C 0.62 1, 0.78 0.8, 1 0.48 L 1 1 Z" />
        </clipPath>
      </defs>
    </svg>

    <header class="navbar">
      <div class="container nav-inner">
        <div class="nav-left">
          <a class="logo" href="#home"
            >Just<span class="logo-i">i</span
            ><span class="logo-accent">n</span></a
          >

          <nav class="nav-links">
            <a href="#about">About me</a>
            <a href="#skills">Skills</a>
            <a href="#portfolio">Portfolio</a>
          </nav>
        </div>

        <div class="lang-switch">
          <button class="lang-btn active" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <section class="hero" id="home">
      <div class="hero-glow hero-glow--purple"></div>
      <div class="hero-glow hero-glow--green"></div>

      <div class="hero-inner">
        <div class="hero-image">
          <img src="./assets/img/Justin.png" alt="Justin Kamionka" />
        </div>

        <div class="hero-content">
          <div class="hero-text">
            
            <div class="hero-split">
            <span class="hero-iam">I am</span>
            <h1>Justin Kamionka</h1>
            <p class="hero-role">Frontend Developer</p>
            </div>
            <a class="btn-primary" href="#contact">Let's talk!</a>
          </div>
        </div>
      </div>

      <div class="hero-scroll">
        <span>Scroll down</span>
      </div>
    </section>
  </body>
</html>
